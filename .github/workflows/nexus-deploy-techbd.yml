            git commit -m "ci: nexus-fhir-devl ${{ github.ref_name }} deployment"
            git push --set-upstream origin nexus-fhir-devl-deployment-${{ github.ref_name}}-deployment
        - name: Create Pull Request
          env:
            GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
          run: |
            cd infrastructure-prime
            gh pr create --base main --head nexus-fhir-devl-deployment-${{ github.ref_name}}-deployment --title "Nexus devl FHIR techbd.org ${{ github.ref_name }} update" --body "Automated techbd Nexus devl FHIR deployment for version ${{ github.ref_name }}"


    nexus-csv-devl-deployment:
