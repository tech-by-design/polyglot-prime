            git config --global user.name "GitHub Action"

        - name: Clone infrastructure repository
          run: |
            git clone https://${{ secrets.ACTIONS_GITHUB_TOKEN }}@github.com/tech-by-design/infrastructure-prime.git

        - name: Create and switch to a new branch
          run: |
            cd infrastructure-prime
            git checkout -b nexus-csv-devl-deployment-${{ github.ref_name}}-deployment

        - name: Update fhir environment file
          run: |
            cd infrastructure-prime
            sed -i 's/TAG=.*/TAG=${{ github.ref_name }}/g' aws/nexus-csv.dev.techbd.org/.env

        - name: Commit and push changes
          run: |
            cd infrastructure-prime
            git add .
            git commit -m "ci: nexus-csv-devl ${{ github.ref_name }} deployment"
            git push --set-upstream origin nexus-csv-devl-deployment-${{ github.ref_name}}-deployment
